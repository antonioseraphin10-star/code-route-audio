<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link rel="icon" href="icon-192.png" sizes="192x192" type="image/png">

<style>
  :root{
    --bg:#0f172a; --bg2:#1e293b; --card:#ffffff; --ink:#0f172a; --muted:#64748b;
    --line:#e2e8f0; --brand:#2563eb; --brand2:#1d4ed8; --green:#16a34a; --green-bg:#dcfce7;
    --red:#dc2626; --red-bg:#fee2e2; --amber:#d97706; --amber-bg:#fef3c7;
    --shadow:0 10px 30px rgba(2,6,23,.12); --radius:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
    color:var(--ink);
    background:linear-gradient(180deg,#0f172a 0%,#1e3a8a 100%);
    background-attachment:fixed;
    min-height:100vh; line-height:1.5; -webkit-font-smoothing:antialiased;
    -webkit-tap-highlight-color:transparent;
  }
  .wrap{max-width:880px;margin:0 auto;
    padding:calc(16px + env(safe-area-inset-top)) calc(16px + env(safe-area-inset-right)) calc(60px + env(safe-area-inset-bottom)) calc(16px + env(safe-area-inset-left));}

  header.bar{display:flex;align-items:center;gap:10px;margin-bottom:18px;color:#fff}
  .logo{display:flex;align-items:center;gap:10px;cursor:pointer;font-weight:800;font-size:18px}
  .logo .badge{width:38px;height:38px;border-radius:11px;background:#fff;display:grid;place-items:center;font-size:20px;box-shadow:var(--shadow)}
  .bar .spacer{flex:1}
  .iconbtn{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);color:#fff;
    width:42px;height:42px;border-radius:11px;font-size:18px;cursor:pointer;display:grid;place-items:center;transition:.15s;touch-action:manipulation}
  .iconbtn:hover{background:rgba(255,255,255,.28)}

  .panel{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin-bottom:16px}
  .hero{color:#fff;text-align:center;margin:6px 0 18px}
  .hero h1{font-size:25px;font-weight:800;letter-spacing:-.5px}
  .hero p{opacity:.85;margin-top:6px;font-size:14.5px}
  .stats-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px}
  .pill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);color:#fff;
    padding:8px 14px;border-radius:999px;font-size:13px;font-weight:600}
  .pill b{font-size:15px}
  .pill.click{cursor:pointer}.pill.click:hover{background:rgba(255,255,255,.22)}

  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  @media(max-width:620px){.grid{grid-template-columns:1fr}}
  .theme-card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:18px;cursor:pointer;
    display:flex;gap:14px;align-items:center;border:2px solid transparent;transition:.16s;position:relative;overflow:hidden;touch-action:manipulation}
  .theme-card:hover{transform:translateY(-3px);border-color:var(--brand)}
  .theme-card .tnum{min-width:46px;height:46px;border-radius:13px;display:grid;place-items:center;color:#fff;font-weight:800;font-size:18px}
  .theme-card h3{font-size:16px;font-weight:700;line-height:1.25}
  .theme-card .sub{color:var(--muted);font-size:12.5px;margin-top:3px}
  .theme-card .prog{height:6px;background:var(--line);border-radius:99px;margin-top:8px;overflow:hidden}
  .theme-card .prog>i{display:block;height:100%;background:var(--green);border-radius:99px;width:0}

  .crumb{color:#cbd5e1;font-size:13px;margin-bottom:12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .crumb a{color:#fff;cursor:pointer;text-decoration:none;font-weight:600}
  .crumb a:hover{text-decoration:underline}
  .sec-title{color:#fff;font-weight:800;font-size:20px;margin:4px 0 14px;display:flex;align-items:center;gap:10px}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;
    font-weight:700;border-radius:12px;padding:12px 18px;font-size:15px;transition:.15s;font-family:inherit;touch-action:manipulation}
  .btn-primary{background:var(--brand);color:#fff}
  .btn-primary:hover{background:var(--brand2)}
  .btn-ghost{background:#f1f5f9;color:var(--ink)}
  .btn-ghost:hover{background:#e2e8f0}
  .btn-green{background:var(--green);color:#fff}
  .btn-green:hover{filter:brightness(.95)}
  .btn-lg{padding:15px 22px;font-size:16px;width:100%}
  .btn[disabled]{opacity:.5;cursor:not-allowed}

  .subrow{display:flex;align-items:center;gap:12px;padding:13px 4px;border-bottom:1px solid var(--line)}
  .subrow:last-child{border-bottom:none}
  .subrow .sid{min-width:42px;height:34px;border-radius:9px;background:#eef2ff;color:var(--brand);display:grid;place-items:center;font-weight:800;font-size:13px}
  .subrow .meta{flex:1;min-width:0}
  .subrow .meta b{font-size:14.5px;display:block;line-height:1.3}
  .subrow .meta span{color:var(--muted);font-size:12.5px}
  .subrow .acts{display:flex;gap:6px;flex-shrink:0}
  .mini{padding:8px 12px;font-size:13px;border-radius:10px}
  @media(max-width:480px){
    .subrow{flex-wrap:wrap}
    .subrow .acts{width:100%;padding-left:54px}
    .subrow .acts .btn{flex:1}
  }

  .course h3{font-size:17px;margin:18px 0 6px;color:var(--brand2)}
  .course p{margin:8px 0;color:#1f2937}
  .course ul{margin:6px 0 6px 4px;list-style:none}
  .course li{position:relative;padding:5px 0 5px 22px;color:#1f2937}
  .course li:before{content:"›";position:absolute;left:4px;top:5px;color:var(--brand);font-weight:800}
  .reader{position:sticky;top:8px;z-index:5;display:flex;gap:8px;align-items:center;background:#0f172a;
    color:#fff;padding:10px 12px;border-radius:14px;margin-bottom:8px;box-shadow:var(--shadow)}
  .reader .rbtn{background:#fff;color:#0f172a;border:none;border-radius:10px;width:42px;height:42px;font-size:18px;cursor:pointer;touch-action:manipulation}
  .reader .rinfo{flex:1;font-size:13px;opacity:.9;min-width:0}
  .reader .rbar{height:6px;background:rgba(255,255,255,.2);border-radius:99px;flex:1;overflow:hidden;max-width:140px}
  .reader .rbar>i{display:block;height:100%;background:#38bdf8;width:0}

  .qhead{display:flex;align-items:center;gap:12px;color:#fff;margin-bottom:10px}
  .qhead .qcount{font-weight:800;font-size:15px}
  .qhead .score{margin-left:auto;font-size:14px;background:rgba(255,255,255,.14);padding:6px 12px;border-radius:99px;font-weight:700}
  .qbar{height:8px;background:rgba(255,255,255,.16);border-radius:99px;overflow:hidden;margin-bottom:16px}
  .qbar>i{display:block;height:100%;background:linear-gradient(90deg,#22d3ee,#3b82f6);width:0;transition:.3s}
  .qtext{font-size:19px;font-weight:700;line-height:1.4;margin:6px 0 6px}
  .qvisual{display:flex;justify-content:center;margin:4px 0 16px}
  .qvisual svg{width:100%;max-width:260px;height:auto;background:#f8fafc;border:1px solid var(--line);border-radius:14px;padding:10px}
  @media(max-width:480px){.qvisual svg{max-width:230px}}
  .qtags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .tag{font-size:11.5px;font-weight:700;color:var(--brand);background:#eef2ff;padding:4px 10px;border-radius:99px}
  .choices{display:flex;flex-direction:column;gap:11px}
  .choice{display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:#fff;border:2px solid var(--line);
    border-radius:14px;padding:15px 16px;font-size:15.5px;cursor:pointer;transition:.13s;font-family:inherit;color:var(--ink);touch-action:manipulation}
  .choice:hover:not([disabled]){border-color:var(--brand);background:#f8faff}
  .choice .key{min-width:34px;height:34px;border-radius:9px;background:#eef2ff;color:var(--brand);
    display:grid;place-items:center;font-weight:800;font-size:15px;flex-shrink:0}
  .choice .ctxt{flex:1}
  .choice .mark{font-size:20px;opacity:0;transition:.15s}
  .choice.correct{border-color:var(--green);background:var(--green-bg)}
  .choice.correct .key{background:var(--green);color:#fff}
  .choice.correct .mark{opacity:1}
  .choice.wrong{border-color:var(--red);background:var(--red-bg)}
  .choice.wrong .key{background:var(--red);color:#fff}
  .choice.wrong .mark{opacity:1}
  .choice[disabled]{cursor:default}
  .qfoot{display:flex;gap:10px;align-items:center;margin-top:18px;flex-wrap:wrap}
  .qfoot .ftip{color:var(--muted);font-size:12.5px;flex:1;min-width:120px}
  @media(max-width:480px){.qfoot .ftip{display:none}.qfoot .btn{width:100%}}

  .feedback{margin-top:14px;padding:13px 15px;border-radius:13px;font-size:14.5px;display:none}
  .feedback.show{display:block}
  .feedback.ok{background:var(--green-bg);color:#14532d;border:1px solid #86efac}
  .feedback.no{background:var(--red-bg);color:#7f1d1d;border:1px solid #fca5a5}

  .result-top{text-align:center;padding:10px 0}
  .ring{width:150px;height:150px;margin:6px auto 4px;position:relative}
  .ring svg{transform:rotate(-90deg)}
  .ring .pct{position:absolute;inset:0;display:grid;place-content:center;text-align:center}
  .ring .pct b{font-size:34px;font-weight:800}
  .ring .pct span{font-size:12px;color:var(--muted)}
  .verdict{font-size:20px;font-weight:800;margin-top:6px}
  .miss{margin-top:8px}
  .miss .mq{border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-top:10px}
  .miss .mq .q{font-weight:700;font-size:14.5px}
  .miss .mq .a{font-size:13.5px;margin-top:5px}
  .miss .mq .a .good{color:var(--green);font-weight:700}

  /* ---------- Stats dashboard ---------- */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
  @media(max-width:560px){.kpis{grid-template-columns:repeat(2,1fr)}}
  .kpi{background:var(--card);border-radius:14px;padding:14px 10px;box-shadow:var(--shadow);text-align:center}
  .kpi b{font-size:23px;display:block;color:var(--ink);line-height:1.1}
  .kpi span{font-size:11.5px;color:var(--muted)}
  .card-h{font-weight:800;font-size:15.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .tbar{display:flex;align-items:center;gap:10px;margin:10px 0;cursor:pointer}
  .tbar .tlabel{font-size:13px;flex:0 0 36%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
  .tbar .track{flex:1;height:16px;background:#eef2f7;border-radius:99px;overflow:hidden}
  .tbar .track>i{display:block;height:100%;border-radius:99px;transition:width .5s}
  .tbar .tval{font-size:12px;font-weight:700;flex:0 0 70px;text-align:right;color:var(--muted)}
  .days{display:flex;align-items:flex-end;gap:4px;height:120px;margin-top:6px}
  .days .day{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end}
  .days .day .col{width:100%;max-width:22px;background:linear-gradient(180deg,#3b82f6,#1d4ed8);border-radius:5px 5px 0 0;min-height:3px;transition:height .4s}
  .days .day .col.zero{background:#e2e8f0}
  .days .day small{font-size:9px;color:var(--muted);line-height:1}
  .trend svg{width:100%;height:auto;display:block;overflow:visible}
  .weak{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid var(--line)}
  .weak:last-child{border-bottom:none}
  .weak .wi{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;font-size:18px;flex-shrink:0}
  .weak .wm{flex:1;min-width:0}
  .weak .wm b{font-size:14px;display:block}
  .weak .wm span{font-size:12px;color:var(--muted)}
  .empty{text-align:center;color:var(--muted);padding:18px}
  .empty .big{font-size:40px;margin-bottom:8px}
  .actions-row{display:flex;gap:10px;flex-wrap:wrap}
  .actions-row .btn{flex:1;min-width:130px}
  .danger{color:var(--red)!important;background:#fff1f2!important}

  .modal-bg{position:fixed;inset:0;background:rgba(2,6,23,.55);display:none;place-items:center;z-index:50;padding:16px}
  .modal-bg.show{display:grid}
  .modal{background:#fff;border-radius:18px;max-width:440px;width:100%;padding:22px;box-shadow:var(--shadow)}
  .modal h3{font-size:18px;margin-bottom:14px}
  .field{margin-bottom:16px}
  .field label{font-weight:700;font-size:13.5px;display:block;margin-bottom:7px}
  .field select,.field input[type=range]{width:100%}
  .field select{padding:10px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit}
  .switch{display:flex;align-items:center;gap:10px;cursor:pointer}
  .switch input{width:42px;height:24px;appearance:none;-webkit-appearance:none;background:#cbd5e1;border-radius:99px;position:relative;cursor:pointer;transition:.2s;flex-shrink:0}
  .switch input:checked{background:var(--green)}
  .switch input:before{content:"";position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:3px;left:3px;transition:.2s}
  .switch input:checked:before{left:21px}
  .rate-val{font-weight:800;color:var(--brand)}
  .hint{background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:12.5px;color:var(--muted);margin-top:6px}
  kbd{background:#0f172a;color:#fff;border-radius:6px;padding:1px 7px;font-size:11px;font-family:inherit}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(40px);background:#0f172a;color:#fff;
    padding:12px 18px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:var(--shadow);opacity:0;transition:.3s;z-index:60;pointer-events:none;max-width:90vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <header class="bar">
    <div class="logo" onclick="App.go('home')">
      <span class="badge">🚦</span><span>Code Audio</span>
    </div>
    <div class="spacer"></div>
    <button class="iconbtn" title="Ma progression" onclick="App.go('stats')">📊</button>
    <button class="iconbtn" title="Réglages voix" onclick="App.openSettings()">⚙️</button>
  </header>
  <main id="app"></main>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>⚙️ Réglages de la voix</h3>
    <div class="field">
      <label>Voix de lecture</label>
      <select id="selVoice"></select>
    </div>
    <div class="field">
      <label>Vitesse de lecture · <span class="rate-val" id="rateVal">1.0×</span></label>
      <input type="range" id="rngRate" min="0.6" max="1.4" step="0.05" value="1">
    </div>
    <div class="field">
      <label class="switch">
        <input type="checkbox" id="chkAuto" checked>
        <span>Lecture automatique des questions &amp; réponses</span>
      </label>
    </div>
    <div class="field" style="margin-bottom:8px">
      <button class="btn btn-ghost mini" onclick="TTS.test()">🔊 Tester la voix</button>
    </div>
    <div class="hint" id="voiceHint"></div>
    <button class="btn btn-primary" style="width:100%;margin-top:14px" onclick="App.closeSettings()">Fermer</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="importFile" accept="application/json,.json" style="display:none">

<script src="data.js"></script>
<script src="visuals.js"></script>
<script src="images.js"></script>
<script>
/* ============================ Utils ============================ */
const $ = (s,r=document)=>r.querySelector(s);
const el = (t,c,h)=>{const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e;};
const esc = s => (s||"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
const THEME_COLORS=["#2563eb","#0891b2","#7c3aed","#db2777","#16a34a","#ea580c","#0d9488","#dc2626","#9333ea","#475569"];
const THEME_ICONS=["🧑‍✈️","🚸","🛣️","🚲","🌿","🅿️","🔧","⛑️","🛡️","📋"];
const shuffle = a => {let x=a.slice();for(let i=x.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]];}return x;};
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const DATA = window.CODE_DATA;
const IS_IOS = /iP(hone|ad|od)/.test(navigator.userAgent) || (/Macintosh/.test(navigator.userAgent) && "ontouchend" in document);

function fmtDay(dt){return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");}
function todayStr(){return fmtDay(new Date());}
function addDays(ds,n){const p=ds.split("-").map(Number);const dt=new Date(p[0],p[1]-1,p[2]);dt.setDate(dt.getDate()+n);return fmtDay(dt);}

function toast(msg){const t=$("#toast");t.textContent=msg;t.classList.add("show");clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove("show"),2200);}

/* ============================ Persistence ============================ */
const Store = {
  s:JSON.parse(localStorage.getItem("cdlr_settings")||"{}"),
  st:null,
  init(){
    this.st=JSON.parse(localStorage.getItem("cdlr_stats")||"{}");
    const d={version:2,totalAnswered:0,totalCorrect:0,themes:{},subs:{},questions:{},sessions:[],days:{}};
    for(const k in d) if(this.st[k]===undefined) this.st[k]=d[k];
    this.saveSt();
  },
  saveS(){localStorage.setItem("cdlr_settings",JSON.stringify(this.s));},
  saveSt(){localStorage.setItem("cdlr_stats",JSON.stringify(this.st));},
  get(k,d){return this.s[k]===undefined?d:this.s[k];},
  set(k,v){this.s[k]=v;this.saveS();},

  logAnswer(item,correct){
    const st=this.st, tnum=item.tnum, qid=item.q.id, day=todayStr();
    st.totalAnswered++; if(correct)st.totalCorrect++;
    (st.themes[tnum]=st.themes[tnum]||{a:0,c:0}); st.themes[tnum].a++; if(correct)st.themes[tnum].c++;
    (st.questions[qid]=st.questions[qid]||{s:0,c:0}); st.questions[qid].s++; if(correct)st.questions[qid].c++; st.questions[qid].l=Date.now();
    (st.days[day]=st.days[day]||{a:0,c:0}); st.days[day].a++; if(correct)st.days[day].c++;
    this.saveSt();
  },
  logSession(meta,correct,total){
    this.st.sessions.push({t:Date.now(),title:meta.title,c:correct,n:total,tnum:meta.themeNum||null});
    if(this.st.sessions.length>300)this.st.sessions=this.st.sessions.slice(-300);
    this.saveSt();
  },
  recordSub(key,correct,total){
    const cur=this.st.subs[key];
    if(!cur||cur.best<correct/total)this.st.subs[key]={best:correct/total,total,when:Date.now()};
    this.saveSt();
  },
  bestSub(key){return this.st.subs[key]?this.st.subs[key].best:null;},

  streak(){
    const set=new Set(Object.keys(this.st.days));
    if(!set.size)return {current:0,best:0};
    let best=0;
    for(const d of set){
      if(!set.has(addDays(d,-1))){let run=0,c=d;while(set.has(c)){run++;c=addDays(c,1);}best=Math.max(best,run);}
    }
    let current=0,c=todayStr();
    if(!set.has(c))c=addDays(c,-1);
    while(set.has(c)){current++;c=addDays(c,-1);}
    return {current,best};
  },
  reset(){
    this.st={version:2,totalAnswered:0,totalCorrect:0,themes:{},subs:{},questions:{},sessions:[],days:{}};
    this.saveSt();
  },
  exportData(){return JSON.stringify({app:"cdlr",version:2,exportedAt:new Date().toISOString(),settings:this.s,stats:this.st},null,1);},
  importData(obj){
    if(!obj||obj.app!=="cdlr"||!obj.stats)throw new Error("Fichier non reconnu");
    this.st=obj.stats; this.saveSt();
    if(obj.settings){this.s=obj.settings; this.saveS();}
  }
};

/* ============================ Text-to-Speech ============================ */
function splitSentences(t){
  const m=(t||"").match(/[^.!?]+[.!?]*\s*/g);
  return m?m.map(s=>s.trim()).filter(Boolean):((t&&t.trim())?[t.trim()]:[]);
}
const TTS = {
  voices:[], voice:null, rate:1, speaking:false, _kick:null, _unlocked:false,
  supported:("speechSynthesis" in window),
  init(){
    if(!this.supported) return;
    this.rate=Store.get("rate",1);
    const load=()=>{
      const all=speechSynthesis.getVoices();
      this.voices=all.filter(v=>/^fr/i.test(v.lang));
      if(!this.voices.length) this.voices=all;
      this.pick(Store.get("voiceURI",null));
      App.fillVoices&&App.fillVoices();
    };
    load();
    speechSynthesis.onvoiceschanged=load;
  },
  unlock(){
    if(this._unlocked||!this.supported)return;
    this._unlocked=true;
    try{const u=new SpeechSynthesisUtterance(" ");u.volume=0;u.rate=2;speechSynthesis.speak(u);}catch(e){}
    if(!this.voices.length){setTimeout(()=>{this.voices=speechSynthesis.getVoices().filter(v=>/^fr/i.test(v.lang))||[];if(!this.voices.length)this.voices=speechSynthesis.getVoices();this.pick(Store.get("voiceURI",null));},150);}
  },
  pick(uri){
    if(uri) this.voice=this.voices.find(v=>v.voiceURI===uri)||null;
    if(!this.voice){
      this.voice=this.voices.find(v=>/fr-FR/i.test(v.lang))
               ||this.voices.find(v=>/^fr/i.test(v.lang))
               ||this.voices[0]||null;
    }
  },
  clean(t){return (t||"").replace(/\s*\*\s*/g," ").replace(/\s+/g," ").trim();},
  cancel(){
    this.speaking=false;
    if(this._kick){clearInterval(this._kick);this._kick=null;}
    if(this.supported){try{speechSynthesis.cancel();}catch(e){}}
  },
  speakChunks(chunks,opts){
    opts=opts||{};
    this.cancel();
    if(!this.supported){opts.onend&&opts.onend();return;}
    chunks=(chunks||[]).map(c=>this.clean(c)).filter(Boolean);
    if(!chunks.length){opts.onend&&opts.onend();return;}
    this.speaking=true;
    let idx=0; const total=chunks.length, self=this;
    const next=()=>{
      if(!self.speaking)return;
      if(idx>=total){self.speaking=false;if(self._kick){clearInterval(self._kick);self._kick=null;}opts.onend&&opts.onend();return;}
      const u=new SpeechSynthesisUtterance(chunks[idx]);
      if(self.voice)u.voice=self.voice;
      u.lang=(self.voice&&self.voice.lang)||"fr-FR";
      u.rate=self.rate; u.pitch=1;
      u.onend=()=>{idx++; opts.onprogress&&opts.onprogress(idx,total); next();};
      u.onerror=()=>{idx++; next();};
      try{speechSynthesis.speak(u);}catch(e){idx++;next();}
    };
    const start=()=>{
      try{speechSynthesis.resume();}catch(e){}
      if(!IS_IOS) this._kick=setInterval(()=>{try{if(speechSynthesis.speaking){speechSynthesis.pause();speechSynthesis.resume();}}catch(e){}},9000);
      next();
    };
    if(IS_IOS) setTimeout(start,90); else start();
  },
  speak(text,opts){this.speakChunks([text],opts);},
  pauseToggle(){if(!this.supported)return;if(speechSynthesis.paused)speechSynthesis.resume();else if(speechSynthesis.speaking)speechSynthesis.pause();},
  test(){this._unlocked=true;this.speak("Bonjour ! Voici la voix qui lira vos questions du code de la route. Bonne révision !");}
};

  /* ---------- COURSE ---------- */
  renderCourse(c){
    const ti=c.ti, si=c.si, t=DATA.themes[ti], s=t.subthemes[si], app=$("#app");

    while(i<b.length){
      if(b[i].t==="li"){html+="<ul>";while(i<b.length&&b[i].t==="li"){html+=`<li>${esc(b[i].s)}</li>`;i++;}html+="</ul>";}
      else if(b[i].t==="h"){html+=`<h3>${esc(b[i].s)}</h3>`;i++;}
      else{html+=`<p>${esc(b[i].s)}</p>`;i++;}
    }
    app.innerHTML=`
      <div class="crumb"><a onclick="App.go('home')">Accueil</a> › <a onclick="App.go('theme',{ti:${ti}})">${esc(t.title)}</a> › <span>Cours ${esc(s.id)}</span></div>

      <div class="reader">
        <button class="rbtn" id="rPlay" title="Lire / Pause">▶️</button>
        <button class="rbtn" id="rStop" title="Arrêter" style="background:#334155;color:#fff">⏹️</button>
        <div class="rinfo" id="rInfo">Écouter la leçon</div>
        <div class="rbar"><i id="rBar"></i></div>
      </div>
      <div class="panel course">${html||"<p>Pas de contenu de cours pour cette leçon.</p>"}</div>
      <button class="btn btn-primary btn-lg" onclick="App.startSubQuiz(${ti},${si})">🎯 Passer au quiz de cette leçon</button>`;
    const chunks=[];
    s.course.forEach(blk=>splitSentences(blk.s).forEach(p=>chunks.push(p)));
    let playing=false;
    const info=$("#rInfo"),bar=$("#rBar"),play=$("#rPlay");
    const startRead=()=>{
      playing=true;play.textContent="⏸️";info.textContent="Lecture en cours…";
      TTS.speakChunks(chunks,{
        onprogress:(d,tot)=>{bar.style.width=Math.round(d/tot*100)+"%";},
        onend:()=>{playing=false;play.textContent="▶️";info.textContent="Lecture terminée ✓";bar.style.width="100%";}
      });
    };
    play.onclick=()=>{
      if(!playing){
        if(TTS.supported&&speechSynthesis.paused){speechSynthesis.resume();play.textContent="⏸️";playing=true;return;}
        startRead();
      }else{TTS.pauseToggle();playing=false;play.textContent="▶️";info.textContent="En pause";}
    };
    $("#rStop").onclick=()=>{TTS.cancel();playing=false;play.textContent="▶️";info.textContent="Écouter la leçon";bar.style.width="0";};
  },

  /* ---------- QUIZ ---------- */
  startQuiz(list,meta){
    if(!list||!list.length){toast("Aucune question disponible.");return;}
    this.quiz={list,meta,i:0,correct:0,answered:false,missed:[]};
    this.go("quiz");
  },
  renderQuiz(){
    const Q=this.quiz, app=$("#app");
    const item=Q.list[Q.i], q=item.q, letters=Object.keys(q.choices).sort();
    let ch="";
    letters.forEach(L=>{ch+=`<button class="choice" data-l="${L}" onclick="App.answer('${L}')">
        <span class="key">${L}</span><span class="ctxt">${esc(q.choices[L])}</span><span class="mark"></span></button>`;});
    const pct=Math.round(Q.i/Q.list.length*100);
    const vis=(window.CODE_IMAGES&&window.CODE_VISUALS)?window.CODE_IMAGES[q.id]:null;
    const visHtml=vis?`<div class="qvisual">${CODE_VISUALS.render(vis)}</div>`:"";
    app.innerHTML=`
      <div class="crumb"><a onclick="App.quitQuiz()">✕ Quitter</a> › <span>${esc(Q.meta.title)}</span></div>
      <div class="qhead">
        <span class="qcount">Question ${Q.i+1} / ${Q.list.length}</span>
        <span class="score" id="qScore">✓ ${Q.correct}</span>
      </div>
      <div class="qbar"><i style="width:${pct}%"></i></div>
      <div class="panel">
        <div class="qtags">
          <span class="tag">${esc(item.sid)} ${esc(item.stitle)}</span>
          <span class="tag" style="background:#f1f5f9;color:#475569;cursor:pointer" onclick="App.reread()">🔊 Réécouter</span>
        </div>
        ${visHtml}
        <div class="qtext">${esc(q.text)}</div>
        <div class="choices">${ch}</div>
        <div class="feedback" id="fb"></div>
        <div class="qfoot">
          <span class="ftip">Réponds avec <kbd>A</kbd>..<kbd>D</kbd> · <kbd>R</kbd> réécouter · <kbd>Entrée</kbd> suivante</span>
          <button class="btn btn-primary" id="nextBtn" style="display:none" onclick="App.next()">Suivante →</button>
        </div>
      </div>`;
    Q.answered=false;
    this.autoRead(q,letters);
  },
  autoRead(q,letters){
    if(!Store.get("autoread",true))return;
    const chunks=["Question. "+q.text];
    letters.forEach(L=>chunks.push("Réponse "+L+". "+q.choices[L]));
    TTS.speakChunks(chunks);
  },
  reread(){
    TTS.unlock();
    const Q=this.quiz,q=Q.list[Q.i].q,letters=Object.keys(q.choices).sort();
    const chunks=["Question. "+q.text];letters.forEach(L=>chunks.push("Réponse "+L+". "+q.choices[L]));
    TTS.speakChunks(chunks);
  },
  answer(L){
    const Q=this.quiz; if(Q.answered)return; Q.answered=true;
    TTS.cancel();
    const item=Q.list[Q.i], q=item.q, correct=q.answer;
    document.querySelectorAll(".choice").forEach(b=>{
      b.setAttribute("disabled","");
      const bl=b.getAttribute("data-l");
      if(bl===correct){b.classList.add("correct");b.querySelector(".mark").textContent="✓";}
      if(bl===L&&L!==correct){b.classList.add("wrong");b.querySelector(".mark").textContent="✗";}
    });
    const ok=L===correct;
    if(ok)Q.correct++; else Q.missed.push(item);
    Store.logAnswer(item,ok);
    $("#qScore").textContent="✓ "+Q.correct;
    const fb=$("#fb");
    fb.className="feedback show "+(ok?"ok":"no");
    fb.innerHTML=ok?"✅ <b>Bonne réponse !</b>":`❌ <b>Raté.</b> La bonne réponse était <b>${correct}</b> : ${esc(q.choices[correct])}`;
    const nb=$("#nextBtn");
    nb.style.display="inline-flex";
    nb.textContent=(Q.i+1>=Q.list.length)?"Voir le résultat →":"Suivante →";
    nb.focus();
  },
  next(){const Q=this.quiz;if(Q.i+1>=Q.list.length){this.finishQuiz();return;}Q.i++;this.renderQuiz();},
  finishQuiz(){
    const Q=this.quiz;
    if(Q.meta.key)Store.recordSub(Q.meta.key,Q.correct,Q.list.length);
    Store.logSession(Q.meta,Q.correct,Q.list.length);
    this.go("results");
  },
  quitQuiz(){TTS.cancel();if(confirm("Quitter ce quiz ? Ta progression de cette série sera perdue."))this.go("home");},

    </div>`;
    // Ring
    const C=2*Math.PI*54, off=C*(1-st.totalCorrect/st.totalAnswered), rc=acc>=88?"var(--green)":acc>=70?"var(--amber)":"var(--red)";
    const ring=`<div class="panel"><div class="card-h">🎯 Précision globale</div>
      <div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap;justify-content:center">
        <div class="ring" style="width:135px;height:135px">

    // Theme accuracy bars

    DATA.themes.forEach((t,i)=>{

    const days=[]; for(let i=13;i>=0;i--){const ds=addDays(todayStr(),-i);days.push({ds,a:(st.days[ds]&&st.days[ds].a)||0});}
    const maxA=Math.max(1,...days.map(d=>d.a));
    const WD=["D","L","M","M","J","V","S"];
    let dcols="";
    days.forEach(d=>{
      const h=Math.round(d.a/maxA*100), p=d.ds.split("-"), wd=WD[new Date(p[0],p[1]-1,p[2]).getDay()];
      dcols+=`<div class="day" title="${d.ds} : ${d.a} question(s)">
        <div class="col${d.a?"":" zero"}" style="height:${d.a?Math.max(h,4):4}%"></div>
        <small>${wd}</small></div>`;
    });
    const totalWeek=days.reduce((a,d)=>a+d.a,0);
    const actCard=`<div class="panel"><div class="card-h">🗓️ Activité — 14 derniers jours <span style="font-weight:500;color:var(--muted);font-size:12px">(${totalWeek} questions)</span></div><div class="days">${dcols}</div></div>`;
    // Session trend (line)
    let trendCard="";
    const sess=st.sessions.slice(-20);
    if(sess.length>=2){
      const W=320,H=120,pad=8;
      const pts=sess.map((s,i)=>{const x=pad+i*(W-2*pad)/(sess.length-1);const y=H-pad-(s.c/s.n)*(H-2*pad);return [x,y];});
      const line=pts.map(p=>p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ");
      const area="M"+pad+","+(H-pad)+" L"+line.replace(/ /g," L")+" L"+(W-pad)+","+(H-pad)+" Z";
      const dots=pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3" fill="#2563eb"/>`).join("");
      const last=Math.round(sess[sess.length-1].c/sess[sess.length-1].n*100);
      trendCard=`<div class="panel trend"><div class="card-h">📈 Progression <span style="font-weight:500;color:var(--muted);font-size:12px">(${sess.length} dernières séries · dernière : ${last}%)</span></div>
        <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
          <line x1="${pad}" y1="${(H-pad-(0.875)*(H-2*pad)).toFixed(1)}" x2="${W-pad}" y2="${(H-pad-(0.875)*(H-2*pad)).toFixed(1)}" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4 4"/>
          <path d="${area}" fill="rgba(37,99,235,.12)"/>
          <polyline points="${line}" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
          ${dots}
        </svg>
        <div style="font-size:11.5px;color:var(--muted);text-align:right">— — — seuil examen 87,5 %</div></div>`;
    }
    // Weak points
    const weakArr=[];
    DATA.themes.forEach((t,i)=>{const d=st.themes[t.num];if(d&&d.a>=3){weakArr.push({i,t,acc:d.c/d.a,d});}});
    weakArr.sort((a,b)=>a.acc-b.acc);
    const weak=weakArr.filter(w=>w.acc<0.85).slice(0,3);
    let weakCard="";
    if(weak.length){
      let rows="";
      weak.forEach(w=>{const a=Math.round(w.acc*100);
        rows+=`<div class="weak">
          <div class="wi" style="background:${THEME_COLORS[w.i]}22">${THEME_ICONS[w.i]}</div>
          <div class="wm"><b>${esc(w.t.title)}</b><span>${a}% de réussite · ${w.d.c}/${w.d.a}</span></div>
          <button class="btn btn-primary mini" onclick="App.startThemeQuiz(${w.i},true)">Réviser</button>
        </div>`;});
      weakCard=`<div class="panel"><div class="card-h">🎯 Tes points faibles</div>${rows}</div>`;
    }
    const actions=`<div class="panel"><div class="card-h">⚙️ Données</div><div class="actions-row">
        <button class="btn btn-ghost" onclick="App.exportProgress()">⬇️ Exporter</button>
        <button class="btn btn-ghost" onclick="document.getElementById('importFile').click()">⬆️ Importer</button>
        <button class="btn btn-ghost danger" onclick="App.resetProgress()">🗑️ Réinitialiser</button>
      </div>
      <div class="hint" style="margin-top:12px">💡 Exporte ta progression pour la transférer entre ton PC et ton iPhone/iPad (les stats sont stockées séparément sur chaque appareil).</div></div>`;
    app.innerHTML=`
      <div class="crumb"><a onclick="App.go('home')">Accueil</a> › <span>Ma progression</span></div>
      <div class="sec-title">📊 Ma progression</div>
      ${kpis}${ring}${themeCard}${trendCard}${actCard}${weakCard}${actions}`;
  },
  exportProgress(){
    try{
      const blob=new Blob([Store.exportData()],{type:"application/json"});
      const url=URL.createObjectURL(blob), a=document.createElement("a");
      a.href=url; a.download="ma-progression-code.json"; document.body.appendChild(a); a.click();
      setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},500);
      toast("Progression exportée ✓");
    }catch(e){toast("Export impossible");}
  },
  resetProgress(){
    if(confirm("Effacer TOUTE ta progression (stats, historique) ? Cette action est irréversible."))
    {Store.reset();toast("Progression réinitialisée");this.go("stats");}
  },

  /* ---------- Settings ---------- */
  openSettings(){$("#modalBg").classList.add("show");this.fillVoices();},
  closeSettings(){$("#modalBg").classList.remove("show");},
  fillVoices(){
    const sel=$("#selVoice"); if(!sel)return; sel.innerHTML="";
    if(!TTS.voices.length)sel.innerHTML="<option>Aucune voix détectée</option>";
    TTS.voices.forEach(v=>{const o=el("option",null,v.name+" ("+v.lang+")");o.value=v.voiceURI;
      if(TTS.voice&&v.voiceURI===TTS.voice.voiceURI)o.selected=true;sel.appendChild(o);});
    const frCount=TTS.voices.filter(v=>/^fr/i.test(v.lang)).length;
    $("#voiceHint").innerHTML=frCount?`🇫🇷 ${frCount} voix française(s) détectée(s).`:
      "Aucune voix française détectée. Sur iPhone/iPad : Réglages › Accessibilité › Contenu énoncé › Voix › Français. Sur PC : paramètres de voix Windows.";
  },
  bindSettings(){
    const r=$("#rngRate"),rv=$("#rateVal"),auto=$("#chkAuto"),sel=$("#selVoice");
    r.value=Store.get("rate",1); rv.textContent=(+r.value).toFixed(2).replace(/0$/,"")+"×";
    auto.checked=Store.get("autoread",true);
    r.oninput=()=>{rv.textContent=(+r.value).toFixed(2).replace(/0$/,"")+"×";TTS.rate=+r.value;Store.set("rate",+r.value);};
    auto.onchange=()=>Store.set("autoread",auto.checked);
    sel.onchange=()=>{TTS.pick(sel.value);Store.set("voiceURI",sel.value);};
    $("#modalBg").onclick=e=>{if(e.target===$("#modalBg"))this.closeSettings();};
    $("#importFile").onchange=e=>{
      const f=e.target.files[0]; if(!f)return;
      const rd=new FileReader();
      rd.onload=()=>{try{Store.importData(JSON.parse(rd.result));toast("Progression importée ✓");App.bindSettings&&0;App.go("stats");}catch(err){toast("Fichier invalide");}};
      rd.readAsText(f); e.target.value="";
    };
  }
};

/* ============================ Keyboard ============================ */
document.addEventListener("keydown",e=>{
  if($("#modalBg").classList.contains("show"))return;
  if(App.view==="quiz"){
    const Q=App.quiz, k=e.key.toUpperCase();
    if(!Q.answered&&["A","B","C","D","E"].includes(k)){
      if(Q.list[Q.i].q.choices[k]!==undefined){App.answer(k);e.preventDefault();}
    }else if(!Q.answered&&["1","2","3","4","5"].includes(e.key)){
      const L=Object.keys(Q.list[Q.i].q.choices).sort()[+e.key-1];
      if(L){App.answer(L);e.preventDefault();}
    }else if(k==="R"){App.reread();e.preventDefault();}
    else if((e.key==="Enter"||e.key===" "||e.key==="ArrowRight")&&Q.answered){App.next();e.preventDefault();}
  }
});

/* Unlock speech on first user gesture (required by iOS Safari) */
window.addEventListener("pointerdown",()=>TTS.unlock(),{once:true});
window.addEventListener("touchend",()=>TTS.unlock(),{once:true});
window.addEventListener("beforeunload",()=>TTS.cancel());

/* PWA service worker (uniquement en http/https, pas en file://) */
if("serviceWorker" in navigator && location.protocol.indexOf("http")===0){
  window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
}

App.start();
</script>
</body>
</html>
